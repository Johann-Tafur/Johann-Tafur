name: Generate contribution snake

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: Platane/snk@v3
        with:
          github_user_name: Johann-Tafur
          outputs: |
            dist/github-contribution-grid-snake-dark.svg?palette=github-dark&color_snake=%23ff00c8&color_dots=%230a0014,%23281342,%236a00ff,%2300e5ff,%23b8ff00
      - uses: crazy-max/ghaction-github-pages@v4
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
